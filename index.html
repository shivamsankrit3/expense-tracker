<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="app">
    <div class="header-row">
      <header class="app-header">
        <h1>Expense Tracker</h1>
        <p class="subtitle">Track what you spend, see where it goes.</p>
      </header>
      <button id="logoutBtn" class="logout-btn">Log out</button>
    </div>
    <p class="user-email" id="userEmail"></p>

    <section class="summary-card">
      <span class="summary-label">Total Spent</span>
      <span class="summary-amount" id="totalAmount">₹0</span>
    </section>

    <section class="form-card">
      <h2>Add Expense</h2>
      <form id="expenseForm">
        <div class="field-row">
          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="e.g. Groceries" required />
          </div>
          <div class="field">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 450" min="0" step="0.01" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="" disabled selected>Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Education">Education</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>
        <button type="submit" class="btn-primary">Add Expense</button>
      </form>
    </section>

    <section class="chart-card">
      <h2>Spending by Category</h2>
      <div class="chart-wrap">
        <canvas id="categoryChart"></canvas>
      </div>
      <p class="empty-state" id="chartEmptyState">Add an expense to see your breakdown here.</p>
    </section>

    <section class="list-card">
      <h2>Recent Expenses</h2>
      <ul id="expenseList" class="expense-list"></ul>
      <p class="empty-state" id="listEmptyState">No expenses yet. Add your first one above.</p>
    </section>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
