<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker — Log In</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase SDKs (loaded from Google's servers, free to use) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Your project's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAfsyCsAPQ0GSALrenHE1qrBOznscM52zg",
      authDomain: "expense-tracker-shivamece.firebaseapp.com",
      projectId: "expense-tracker-shivamece",
      storageBucket: "expense-tracker-shivamece.firebasestorage.app",
      messagingSenderId: "642986534662",
      appId: "1:642986534662:web:ac54b770a4a90b9291a087",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If the user is already logged in, skip straight to the app
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    const form = document.getElementById("authForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove("hidden");
    }

    // Log in an existing user
    loginBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      try {
        await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        window.location.href = "index.html";
      } catch (err) {
        showError("Could not log in: " + err.message);
      }
    });

    // Create a new account
    signupBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      try {
        await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        window.location.href = "index.html";
      } catch (err) {
        showError("Could not sign up: " + err.message);
      }
    });
  </script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Expense Tracker</h1>
      <p class="subtitle">Log in or create an account to track your expenses.</p>
    </header>

    <section class="form-card">
      <h2>Account</h2>
      <form id="authForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="field" style="margin-top: 14px;">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
        </div>

        <p id="errorMsg" class="error-msg hidden"></p>

        <button id="loginBtn" type="submit" class="btn-primary" style="margin-top: 16px;">Log In</button>
        <button id="signupBtn" type="button" class="btn-secondary" style="margin-top: 10px;">Create Account</button>
      </form>
    </section>
  </div>
</body>
</html>
